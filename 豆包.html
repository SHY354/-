<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    /* 通配符清除边距 */
    * {
      margin: 0;
      padding: 0;
    }
    /* 类选择器 */
    .title {
      color: #222;
      font-size: 22px;
      text-align: center;
      margin: 20px 0;
    }
    /* 标签选择器 */
    p {
      line-height: 1.8;
      color: #666;
    }
  </style>
</head>
<body>
  <h2 class="title">CSS基础语法</h2>
  <p>这是一段测试文本</p>
</body>
</html>
